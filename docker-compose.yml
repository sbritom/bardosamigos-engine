services:
  icecast:
    image: moul/icecast
    ports:
      - "8000:8000"
    environment:
      - ICECAST_SOURCE_PASSWORD=hackme
      - ICECAST_ADMIN_PASSWORD=admin
      - ICECAST_RELAY_PASSWORD=relay
      - ICECAST_HOSTNAME=localhost
    volumes:
      - ./server/logs:/var/log/icecast2

  bar-streaming-engine:
    build: .
    depends_on:
      - icecast
    environment:
      - STREAM_DRY_RUN=false
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - ICECAST_MOUNT=/radio
      - ICECAST_USER=source
      - ICECAST_PASSWORD=hackme
      - RADIO_STREAM_ON_START=true
    volumes:
      - ./server/radio/music:/app/server/radio/music
      - ./server/logs:/app/server/logs
      - ./config:/app/config

volumes:
  music:
  logs:
  config:
